# AI Agent PDF Báo Giá — Docker Compose
#
# Usage:
#   cp .env.example .env     # then fill in GOOGLE_API_KEY and API_KEY
#   docker compose up --build
#
version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-pdf-agent
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - API_KEY=${API_KEY:-}           # optional; leave blank to disable auth
      - DEBUG=${DEBUG:-false}
      - MAX_CONCURRENT_JOBS=${MAX_CONCURRENT_JOBS:-3}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-50}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
    volumes:
      # Persist uploads, results, and DB across restarts
      - app-uploads:/app/uploads
      - app-results:/app/results
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          # Cap memory to prevent OOM from large PDFs
          memory: 4G
        reservations:
          memory: 1G

  # Optional: Redis for distributed job queue (future phase)
  # redis:
  #   image: redis:7-alpine
  #   container_name: ai-pdf-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3

volumes:
  app-uploads:
    driver: local
  app-results:
    driver: local
  # redis-data:
